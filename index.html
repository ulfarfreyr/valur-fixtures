<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Valur U19</title>

<!-- iOS "Add to Home Screen" support -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Valur U19" />
<meta name="theme-color" content="#161312" />
<link rel="apple-touch-icon" href="icon.png" />
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#161312;
    --paper:#F7F3EC;
    --paper-dim:#EDE7DB;
    --red:#C8112E;
    --red-dark:#8C0B22;
    --gold:#D9A441;
    --muted:#8A8378;
    --line: rgba(22,19,18,0.10);
    --radius: 14px;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }

  body{
    background:var(--paper);
    color:var(--ink);
    font-family: -apple-system, "Inter", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom: 56px;
  }

  .scoreboard-font{
    font-family: "Oswald","Arial Narrow",sans-serif;
    font-weight:600;
    letter-spacing:0.02em;
    text-transform:uppercase;
  }

  header.top{
    position:sticky; top:0; z-index:10;
    background:var(--ink);
    color:var(--paper);
    padding: max(14px, env(safe-area-inset-top)) 18px 14px 18px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom: 3px solid var(--red);
  }
  header.top .brand{
    display:flex; align-items:center; gap:10px;
  }
  header.top .crest{
    width:28px; height:28px; border-radius:6px;
    background:var(--red);
    display:flex; align-items:center; justify-content:center;
    font-family:"Oswald",sans-serif; font-weight:700; color:#fff; font-size:15px;
  }
  header.top h1{
    font-size:17px; margin:0; font-weight:700;
    font-family:"Oswald",sans-serif; letter-spacing:0.01em;
  }
  header.top .updated{
    font-size:11px; color:rgba(247,243,236,0.55);
    text-align:right; line-height:1.3;
  }
  header.top button.refresh{
    background:none; border:none; color:rgba(247,243,236,0.75);
    font-size:18px; padding:4px 0 0 10px; cursor:pointer;
  }

  main{ max-width:560px; margin:0 auto; padding:18px 16px 8px; }

  /* ---------- hero "next match" card ---------- */
  .hero{
    background: linear-gradient(155deg, var(--red) 0%, var(--red-dark) 100%);
    color:#fff;
    border-radius: var(--radius);
    padding:20px 20px 18px;
    margin-bottom:22px;
    position:relative;
    overflow:hidden;
  }
  .hero::after{
    content:"";
    position:absolute; right:-40px; top:-40px;
    width:160px; height:160px; border-radius:50%;
    background:rgba(255,255,255,0.06);
  }
  .hero .eyebrow{
    font-size:12px; letter-spacing:0.12em;
    color:rgba(255,255,255,0.78);
    font-family:"Oswald",sans-serif; font-weight:600; text-transform:uppercase;
  }
  .hero .matchup{
    font-family:"Oswald",sans-serif;
    font-weight:600;
    font-size:25px;
    line-height:1.18;
    margin:8px 0 12px;
    text-transform:uppercase;
    letter-spacing:0.01em;
  }
  .hero .matchup .vs{
    color:rgba(255,255,255,0.55);
    font-size:14px;
    display:block;
    margin: 2px 0;
    text-transform:none;
    font-family:-apple-system,sans-serif;
    letter-spacing:0;
  }
  .hero .meta{
    display:flex; flex-wrap:wrap; gap:8px 18px;
    font-size:13.5px;
    color:rgba(255,255,255,0.92);
  }
  .hero .meta span{ display:flex; align-items:center; gap:6px; }
  .hero .badge{
    display:inline-block;
    background:rgba(255,255,255,0.18);
    border-radius:7px;
    padding:2px 8px;
    font-size:11px;
    font-weight:700;
    font-family:"Oswald",sans-serif;
    letter-spacing:0.04em;
  }
  .hero .countdown{
    margin-top:14px;
    font-size:12.5px;
    color:var(--gold);
    font-weight:600;
  }

  .hero.empty{
    background:var(--paper-dim);
    color:var(--ink);
    text-align:center;
    padding:28px 20px;
  }
  .hero.empty .matchup{ color:var(--ink); font-size:17px; }
  .hero.empty::after{ display:none; }

  /* ---------- date groups / list ---------- */
  .date-heading{
    font-family:"Oswald",sans-serif;
    font-size:12.5px;
    font-weight:600;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--muted);
    margin: 22px 4px 8px;
  }
  .date-heading:first-of-type{ margin-top:4px; }

  .match-card{
    background:#fff;
    border:1px solid var(--line);
    border-radius: 12px;
    padding:14px 14px;
    margin-bottom:10px;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .match-card .stripe{
    width:4px; align-self:stretch; border-radius:3px;
    background:var(--red);
    flex-shrink:0;
  }
  .match-card.finished .stripe{ background:var(--muted); opacity:0.5; }

  .match-card .body{ flex:1; min-width:0; }

  .match-card .row1{
    display:flex; align-items:baseline; justify-content:space-between; gap:8px;
  }
  .match-card .teams{
    font-size:14.5px;
    font-weight:600;
    line-height:1.35;
  }
  .match-card .teams .valur{ color:var(--red-dark); }
  .match-card .score{
    font-family:"Oswald",sans-serif;
    font-size:16px; font-weight:700;
    white-space:nowrap;
  }
  .match-card .time{
    font-family:"Oswald",sans-serif;
    font-size:14px; font-weight:600; color:var(--muted);
    white-space:nowrap;
  }
  .match-card .row2{
    display:flex; align-items:center; gap:8px; margin-top:5px;
  }
  .match-card .tag{
    font-size:10px; font-weight:700;
    font-family:"Oswald",sans-serif;
    letter-spacing:0.04em;
    background:var(--paper-dim);
    color:var(--ink);
    border-radius:5px;
    padding:2px 6px;
  }
  .match-card .venue{
    font-size:12.5px; color:var(--muted);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  /* ---------- states ---------- */
  .state{
    text-align:center;
    padding:50px 24px;
    color:var(--muted);
  }
  .state h2{
    font-family:"Oswald",sans-serif; color:var(--ink);
    font-size:18px; margin:0 0 6px;
  }
  .state p{ font-size:14px; line-height:1.5; margin:0 0 16px; }
  .state button{
    background:var(--ink); color:var(--paper);
    border:none; border-radius:9px;
    padding:10px 18px; font-size:14px; font-weight:600;
    cursor:pointer;
  }

  footer.note{
    text-align:center; font-size:11.5px; color:var(--muted);
    padding: 18px 24px 30px;
  }
  footer.note a{ color:var(--muted); }
</style>
</head>
<body>

<header class="top">
  <div class="brand">
    <div class="crest">V</div>
    <h1>Valur U19</h1>
  </div>
  <div class="updated" id="updatedLabel">—</div>
</header>

<main id="app">
  <div class="state"><h2>Loading…</h2><p>Fetching the latest fixtures.</p></div>
</main>

<footer class="note">Data from ksi.is · A &amp; B team fixtures, combined</footer>

<script>
const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS_SHORT   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function parseLocalDate(iso){
  // iso = "YYYY-MM-DD" -> local Date at midnight, avoiding UTC-shift bugs
  const [y,m,d] = iso.split("-").map(Number);
  return new Date(y, m-1, d);
}

function formatDateHeading(iso){
  const d = parseLocalDate(iso);
  const today = new Date(); today.setHours(0,0,0,0);
  const diffDays = Math.round((d - today) / 86400000);
  let rel = "";
  if (diffDays === 0) rel = "Today · ";
  else if (diffDays === 1) rel = "Tomorrow · ";
  else if (diffDays === -1) rel = "Yesterday · ";
  return `${rel}${DAYS_SHORT[d.getDay()]} ${d.getDate()} ${MONTHS_SHORT[d.getMonth()]}`;
}

function formatRelativeShort(iso){
  const d = parseLocalDate(iso);
  const today = new Date(); today.setHours(0,0,0,0);
  const diffDays = Math.round((d - today) / 86400000);
  if (diffDays === 0) return "Today";
  if (diffDays === 1) return "Tomorrow";
  if (diffDays > 1) return `In ${diffDays} days`;
  return null;
}

function teamLine(m){
  const home = m.home_team || "?";
  const away = m.away_team || "?";
  const homeCls = home.toLowerCase().includes("valur") ? "valur" : "";
  const awayCls = away.toLowerCase().includes("valur") ? "valur" : "";
  return `<span class="${homeCls}">${home}</span> <span style="color:var(--muted);font-weight:400;">vs</span> <span class="${awayCls}">${away}</span>`;
}

function renderHero(nextMatch){
  if (!nextMatch){
    return `<div class="hero empty">
      <div class="matchup">No upcoming matches found right now</div>
    </div>`;
  }
  const m = nextMatch;
  const rel = formatRelativeShort(m.date);
  return `<div class="hero">
    <div class="eyebrow">Next match · ${m.team_label}</div>
    <div class="matchup">
      ${m.home_team || "?"}
      <span class="vs">vs</span>
      ${m.away_team || "?"}
    </div>
    <div class="meta">
      <span class="badge">${formatDateHeading(m.date)}</span>
      ${m.time ? `<span>⏱ ${m.time}</span>` : ""}
      ${m.venue ? `<span>📍 ${m.venue}</span>` : ""}
    </div>
    ${rel ? `<div class="countdown">${rel}</div>` : ""}
  </div>`;
}

function renderMatchCard(m){
  const finished = m.status === "finished";
  const right = finished
    ? `<span class="score">${m.score || ""}</span>`
    : `<span class="time">${m.time || ""}</span>`;
  return `
    <div class="match-card ${finished ? "finished" : ""}">
      <div class="stripe"></div>
      <div class="body">
        <div class="row1">
          <div class="teams">${teamLine(m)}</div>
          ${right}
        </div>
        <div class="row2">
          <span class="tag">${m.team_label.replace("Valur U19 ", "")} LIÐ</span>
          ${m.venue ? `<span class="venue">${m.venue}</span>` : ""}
        </div>
      </div>
    </div>`;
}

function render(data){
  const app = document.getElementById("app");
  const matches = (data.matches || []).slice();

  if (matches.length === 0){
    app.innerHTML = `<div class="state">
      <h2>No fixtures found</h2>
      <p>Either there's nothing scheduled in the current window, or today's update hasn't run yet. Pull down to refresh in Safari, or check back after the next automatic update.</p>
    </div>`;
    return;
  }

  const today = new Date(); today.setHours(0,0,0,0);
  const upcoming = matches.filter(m => m.date && parseLocalDate(m.date) >= today && m.status !== "finished");
  const nextMatch = upcoming[0] || null;

  let html = renderHero(nextMatch);

  let lastHeading = null;
  for (const m of matches){
    const heading = m.date ? formatDateHeading(m.date) : "Date unknown";
    if (heading !== lastHeading){
      html += `<div class="date-heading">${heading}</div>`;
      lastHeading = heading;
    }
    html += renderMatchCard(m);
  }

  app.innerHTML = html;
}

function renderError(){
  document.getElementById("app").innerHTML = `<div class="state">
    <h2>Couldn't load fixtures</h2>
    <p>The data file didn't load. Check your connection and try again.</p>
    <button onclick="load()">Try again</button>
  </div>`;
}

function setUpdatedLabel(iso){
  const el = document.getElementById("updatedLabel");
  if (!iso){ el.textContent = ""; return; }
  const d = new Date(iso);
  const opts = { hour: "2-digit", minute: "2-digit" };
  el.innerHTML = `Updated<br>${d.toLocaleDateString(undefined,{day:"numeric",month:"short"})}, ${d.toLocaleTimeString(undefined,opts)}`;
}

function load(){
  document.getElementById("app").innerHTML = `<div class="state"><h2>Loading…</h2><p>Fetching the latest fixtures.</p></div>`;
  fetch(`data.json?t=${Date.now()}`)
    .then(r => { if (!r.ok) throw new Error("bad response"); return r.json(); })
    .then(data => {
      setUpdatedLabel(data.generated_at);
      render(data);
    })
    .catch(renderError);
}

load();
</script>
</body>
</html>
