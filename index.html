<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Valur Youth Fixtures</title>

<!-- iOS "Add to Home Screen" support -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Valur Youth" />
<meta name="theme-color" content="#161312" />
<link rel="apple-touch-icon" href="icon.png" />
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#161312;
    --paper:#F7F3EC;
    --paper-dim:#EDE7DB;
    --red:#C8112E;
    --red-dark:#8C0B22;
    --gold:#D9A441;
    --muted:#8A8378;
    --line: rgba(22,19,18,0.10);
    --radius: 14px;
    --profile-accent:#C8112E;
    --profile-accent-dark:#8C0B22;
    --profile-accent-soft:#F7D9DE;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }

  body{
    background:var(--paper);
    color:var(--ink);
    font-family: -apple-system, "Inter", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom: 56px;
  }

  .scoreboard-font{
    font-family: "Oswald","Arial Narrow",sans-serif;
    font-weight:600;
    letter-spacing:0.02em;
    text-transform:uppercase;
  }

  header.top{
    position:sticky; top:0; z-index:10;
    background:var(--ink);
    color:var(--paper);
    padding: max(14px, env(safe-area-inset-top)) 18px 14px 18px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom: 3px solid var(--profile-accent);
  }
  header.top .brand{
    display:flex; align-items:center; gap:10px;
  }
  header.top .crest{
    width:28px; height:28px; border-radius:6px;
    background:var(--profile-accent);
    display:flex; align-items:center; justify-content:center;
    font-family:"Oswald",sans-serif; font-weight:700; color:#fff; font-size:15px;
  }
  header.top h1{
    font-size:17px; margin:0; font-weight:700;
    font-family:"Oswald",sans-serif; letter-spacing:0.01em;
  }
  header.top .updated{
    font-size:11px; color:rgba(247,243,236,0.55);
    text-align:right; line-height:1.3;
  }
  header.top button.refresh{
    background:none; border:none; color:rgba(247,243,236,0.75);
    font-size:18px; padding:4px 0 0 10px; cursor:pointer;
  }

  main{ max-width:560px; margin:0 auto; padding:18px 16px 8px; }

  .tabs{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }
  .tab-btn{
    flex:1;
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink);
    border-radius:10px;
    padding:10px 12px;
    font-family:"Oswald",sans-serif;
    font-size:13px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    cursor:pointer;
  }
  .tab-btn.active{
    background:var(--profile-accent);
    color:var(--paper);
    border-color:var(--profile-accent);
  }

  .calendar-wrap{
    background:#fff;
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px;
  }
  .calendar-legend{
    display:flex;
    gap:14px;
    margin:2px 2px 10px;
    flex-wrap:wrap;
    font-size:12px;
    color:var(--muted);
  }
  .legend-item{
    display:flex;
    align-items:center;
    gap:6px;
    font-weight:600;
  }
  .legend-dot{
    width:10px;
    height:10px;
    border-radius:50%;
    display:inline-block;
  }
  .calendar-grid{
    display:grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap:8px;
  }
  .weekday{
    font-family:"Oswald",sans-serif;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--muted);
    padding:0 2px;
  }
  .day-cell{
    border:1px solid var(--line);
    border-radius:10px;
    min-height:108px;
    padding:7px;
    background:#fff;
  }
  .day-cell.outside-range{
    background:#FAF8F3;
    opacity:0.65;
  }
  .day-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:6px;
  }
  .day-num{
    font-family:"Oswald",sans-serif;
    font-size:15px;
    color:var(--ink);
  }
  .day-month{
    font-size:10px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .day-weekday{
    display:none;
    font-size:10px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .day-matches{
    display:flex;
    flex-direction:column;
    gap:5px;
  }
  .match-chip{
    font-size:11px;
    line-height:1.25;
    border-radius:7px;
    padding:5px 6px;
    border:1px solid var(--line);
    background:#fff;
  }
  .match-chip .time{
    font-family:"Oswald",sans-serif;
    font-weight:600;
    margin-right:5px;
  }

  @media (max-width:700px){
    .calendar-grid{
      grid-template-columns: 1fr;
    }
    .weekday{
      display:none;
    }
    .day-cell{
      min-height:0;
      display:grid;
      grid-template-columns: 56px 1fr;
      gap:8px;
      align-items:start;
    }
    .day-head{
      margin-bottom:0;
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:2px;
    }
    .day-num{
      line-height:1;
    }
    .day-weekday{
      display:block;
    }
    .day-cell.past-day{
      display:none;
    }
  }

  /* ---------- hero "next match" card ---------- */
  .hero{
    background: linear-gradient(155deg, var(--profile-accent) 0%, var(--profile-accent-dark) 100%);
    color:#fff;
    border-radius: var(--radius);
    padding:20px 20px 18px;
    margin-bottom:22px;
    position:relative;
    overflow:hidden;
  }
  .hero::after{
    content:"";
    position:absolute; right:-40px; top:-40px;
    width:160px; height:160px; border-radius:50%;
    background:rgba(255,255,255,0.06);
  }
  .hero .eyebrow{
    font-size:12px; letter-spacing:0.12em;
    color:rgba(255,255,255,0.78);
    font-family:"Oswald",sans-serif; font-weight:600; text-transform:uppercase;
  }
  .hero .matchup{
    font-family:"Oswald",sans-serif;
    font-weight:600;
    font-size:25px;
    line-height:1.18;
    margin:8px 0 12px;
    text-transform:uppercase;
    letter-spacing:0.01em;
  }
  .hero .matchup .vs{
    color:rgba(255,255,255,0.55);
    font-size:14px;
    display:block;
    margin: 2px 0;
    text-transform:none;
    font-family:-apple-system,sans-serif;
    letter-spacing:0;
  }
  .hero .meta{
    display:flex; flex-wrap:wrap; gap:8px 18px;
    font-size:13.5px;
    color:rgba(255,255,255,0.92);
  }
  .hero .meta span{ display:flex; align-items:center; gap:6px; }
  .hero .badge{
    display:inline-block;
    background:rgba(255,255,255,0.18);
    border-radius:7px;
    padding:2px 8px;
    font-size:11px;
    font-weight:700;
    font-family:"Oswald",sans-serif;
    letter-spacing:0.04em;
  }
  .hero .countdown{
    margin-top:14px;
    font-size:12.5px;
    color:var(--gold);
    font-weight:600;
  }

  .hero.empty{
    background:var(--paper-dim);
    color:var(--ink);
    text-align:center;
    padding:28px 20px;
  }
  .hero.empty .matchup{ color:var(--ink); font-size:17px; }
  .hero.empty::after{ display:none; }

  /* ---------- date groups / list ---------- */
  .date-heading{
    font-family:"Oswald",sans-serif;
    font-size:12.5px;
    font-weight:600;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--muted);
    margin: 22px 4px 8px;
  }
  .date-heading:first-of-type{ margin-top:4px; }

  .match-card{
    background:#fff;
    border:1px solid var(--line);
    border-radius: 12px;
    padding:14px 14px;
    margin-bottom:10px;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .match-card .stripe{
    width:4px; align-self:stretch; border-radius:3px;
    background:var(--profile-accent);
    flex-shrink:0;
  }
  .match-card.finished .stripe{ background:var(--muted); opacity:0.5; }

  .match-card .body{ flex:1; min-width:0; }

  .match-card .row1{
    display:flex; align-items:baseline; justify-content:space-between; gap:8px;
  }
  .match-card .teams{
    font-size:14.5px;
    font-weight:600;
    line-height:1.35;
  }
  .match-card .teams .valur{ color:var(--profile-accent-dark); }
  .match-card .score{
    font-family:"Oswald",sans-serif;
    font-size:16px; font-weight:700;
    white-space:nowrap;
  }
  .match-card .time{
    font-family:"Oswald",sans-serif;
    font-size:14px; font-weight:600; color:var(--muted);
    white-space:nowrap;
  }
  .match-card .row2{
    display:flex; align-items:center; gap:8px; margin-top:5px;
  }
  .match-card .tag{
    font-size:10px; font-weight:700;
    font-family:"Oswald",sans-serif;
    letter-spacing:0.04em;
    background:var(--profile-accent-soft);
    color:var(--profile-accent-dark);
    border-radius:5px;
    padding:2px 6px;
  }
  .match-card .venue{
    font-size:12.5px; color:var(--muted);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  /* ---------- states ---------- */
  .state{
    text-align:center;
    padding:50px 24px;
    color:var(--muted);
  }
  .state h2{
    font-family:"Oswald",sans-serif; color:var(--ink);
    font-size:18px; margin:0 0 6px;
  }
  .state p{ font-size:14px; line-height:1.5; margin:0 0 16px; }
  .state button{
    background:var(--ink); color:var(--paper);
    border:none; border-radius:9px;
    padding:10px 18px; font-size:14px; font-weight:600;
    cursor:pointer;
  }

  footer.note{
    text-align:center; font-size:11.5px; color:var(--muted);
    padding: 18px 24px 30px;
  }
  footer.note a{ color:var(--muted); }
</style>
</head>
<body>

<header class="top">
  <div class="brand">
    <div class="crest">V</div>
    <h1 id="titleLabel">Valur Youth</h1>
  </div>
  <div class="updated" id="updatedLabel">—</div>
</header>

<main>
  <div class="tabs" id="tabs"></div>
  <div id="app">
    <div class="state"><h2>Loading…</h2><p>Fetching the latest fixtures.</p></div>
  </div>
</main>

<footer class="note">Data from ksi.is · Jon (U19 A+B) and Stefan (U16 A+B)</footer>

<script>
const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS_SHORT   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DAYS_MONDAY_FIRST = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
const PROFILES = [
  {
    id: "jon",
    label: "Jon",
    ageGroup: "U19",
    colors: {
      accent: "#C8112E",
      accentDark: "#8C0B22",
      accentSoft: "#F7D9DE"
    }
  },
  {
    id: "stefan",
    label: "Stefan",
    ageGroup: "U16",
    colors: {
      accent: "#0D6E6E",
      accentDark: "#084B4B",
      accentSoft: "#D9F0EF"
    }
  }
];
const CALENDAR_TAB = { id: "calendar", label: "Calendar" };

let activeTab = "jon";
let latestData = null;

function escapeHtml(value){
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function parseLocalDate(iso){
  // iso = "YYYY-MM-DD" -> local Date at midnight, avoiding UTC-shift bugs
  const [y,m,d] = iso.split("-").map(Number);
  return new Date(y, m-1, d);
}

function formatDateHeading(iso){
  const d = parseLocalDate(iso);
  const today = new Date(); today.setHours(0,0,0,0);
  const diffDays = Math.round((d - today) / 86400000);
  let rel = "";
  if (diffDays === 0) rel = "Today · ";
  else if (diffDays === 1) rel = "Tomorrow · ";
  else if (diffDays === -1) rel = "Yesterday · ";
  return `${rel}${DAYS_SHORT[d.getDay()]} ${d.getDate()} ${MONTHS_SHORT[d.getMonth()]}`;
}

function formatRelativeShort(iso){
  const d = parseLocalDate(iso);
  const today = new Date(); today.setHours(0,0,0,0);
  const diffDays = Math.round((d - today) / 86400000);
  if (diffDays === 0) return "Today";
  if (diffDays === 1) return "Tomorrow";
  if (diffDays > 1) return `In ${diffDays} days`;
  return null;
}

function teamLine(m){
  const home = m.home_team || "?";
  const away = m.away_team || "?";
  const homeCls = home.toLowerCase().includes("valur") ? "valur" : "";
  const awayCls = away.toLowerCase().includes("valur") ? "valur" : "";
  return `<span class="${homeCls}">${escapeHtml(home)}</span> <span style="color:var(--muted);font-weight:400;">vs</span> <span class="${awayCls}">${escapeHtml(away)}</span>`;
}

function renderHero(nextMatch){
  if (!nextMatch){
    return `<div class="hero empty">
      <div class="matchup">No upcoming matches found right now</div>
    </div>`;
  }
  const m = nextMatch;
  const rel = formatRelativeShort(m.date);
  const safeLabel = escapeHtml(m.team_label || "");
  const safeHome = escapeHtml(m.home_team || "?");
  const safeAway = escapeHtml(m.away_team || "?");
  const safeDate = escapeHtml(formatDateHeading(m.date));
  const safeTime = escapeHtml(m.time || "");
  const safeVenue = escapeHtml(m.venue || "");
  const safeRel = escapeHtml(rel || "");
  return `<div class="hero">
    <div class="eyebrow">Next match · ${safeLabel}</div>
    <div class="matchup">
      ${safeHome}
      <span class="vs">vs</span>
      ${safeAway}
    </div>
    <div class="meta">
      <span class="badge">${safeDate}</span>
      ${m.time ? `<span>⏱ ${safeTime}</span>` : ""}
      ${m.venue ? `<span>📍 ${safeVenue}</span>` : ""}
    </div>
    ${rel ? `<div class="countdown">${safeRel}</div>` : ""}
  </div>`;
}

function renderMatchCard(m){
  const finished = m.status === "finished";
  const safeScore = escapeHtml(m.score || "");
  const safeTime = escapeHtml(m.time || "");
  const shortLabel = m.team || "?";
  const safeShortLabel = escapeHtml(shortLabel);
  const safeVenue = escapeHtml(m.venue || "");
  const right = finished
    ? `<span class="score">${safeScore}</span>`
    : `<span class="time">${safeTime}</span>`;
  return `
    <div class="match-card ${finished ? "finished" : ""}">
      <div class="stripe"></div>
      <div class="body">
        <div class="row1">
          <div class="teams">${teamLine(m)}</div>
          ${right}
        </div>
        <div class="row2">
          <span class="tag">${safeShortLabel} LIÐ</span>
          ${m.venue ? `<span class="venue">${safeVenue}</span>` : ""}
        </div>
      </div>
    </div>`;
}

function profileFromMatch(m){
  return (m.profile || "jon").toLowerCase();
}

function profileMeta(profileId){
  return PROFILES.find(p => p.id === profileId) || PROFILES[0];
}

function currentProfileMeta(){
  return profileMeta(activeTab);
}

function isCalendarTab(){
  return activeTab === CALENDAR_TAB.id;
}

function setTitle(){
  const titleEl = document.getElementById("titleLabel");
  if (isCalendarTab()){
    titleEl.textContent = "Calendar · Next 4 Weeks";
    return;
  }
  const p = currentProfileMeta();
  titleEl.textContent = `${p.label} · ${p.ageGroup}`;
}

function applyProfileTheme(){
  const root = document.documentElement;
  if (isCalendarTab()){
    root.style.setProperty("--profile-accent", "#161312");
    root.style.setProperty("--profile-accent-dark", "#0D0C0B");
    root.style.setProperty("--profile-accent-soft", "#EDE7DB");
    return;
  }
  const p = currentProfileMeta();
  root.style.setProperty("--profile-accent", p.colors.accent);
  root.style.setProperty("--profile-accent-dark", p.colors.accentDark);
  root.style.setProperty("--profile-accent-soft", p.colors.accentSoft);
}

function renderTabs(){
  const tabsEl = document.getElementById("tabs");
  const tabs = [
    ...PROFILES.map(p => ({ id: p.id, label: `${p.label} · ${p.ageGroup}` })),
    CALENDAR_TAB,
  ];
  tabsEl.innerHTML = tabs.map(t => {
    const isActive = t.id === activeTab;
    return `<button class="tab-btn ${isActive ? "active" : ""}" data-tab="${t.id}">${escapeHtml(t.label)}</button>`;
  }).join("");
  for (const btn of tabsEl.querySelectorAll(".tab-btn")){
    btn.addEventListener("click", () => {
      activeTab = btn.dataset.tab;
      renderLatest();
    });
  }
}

function startOfWeekMonday(d){
  const out = new Date(d);
  out.setHours(0,0,0,0);
  const mondayIndex = (out.getDay() + 6) % 7;
  out.setDate(out.getDate() - mondayIndex);
  return out;
}

function endOfWeekSunday(d){
  const out = new Date(d);
  out.setHours(0,0,0,0);
  const mondayIndex = (out.getDay() + 6) % 7;
  out.setDate(out.getDate() + (6 - mondayIndex));
  return out;
}

function dateKey(d){
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function matchDisplayText(m){
  const time = escapeHtml(m.time || "--:--");
  const label = `${m.age_group || ""} ${m.team || ""}`.trim();
  const side = m.valur_is_home ? "Home" : "Away";
  return `<span class="time">${time}</span>${escapeHtml(label)} · ${escapeHtml(side)}`;
}

function renderCalendar(matches){
  const app = document.getElementById("app");
  const today = new Date();
  today.setHours(0,0,0,0);
  const endWindow = new Date(today);
  endWindow.setDate(endWindow.getDate() + 27);

  const upcoming = matches
    .filter(m => m.date && parseLocalDate(m.date) >= today && parseLocalDate(m.date) <= endWindow && m.status !== "finished")
    .sort((a,b) => {
      const aKey = `${a.date || ""} ${a.time || "99:99"}`;
      const bKey = `${b.date || ""} ${b.time || "99:99"}`;
      return aKey.localeCompare(bKey);
    });

  if (upcoming.length === 0){
    app.innerHTML = `<div class="state">
      <h2>No upcoming games</h2>
      <p>No scheduled fixtures were found in the next four weeks.</p>
    </div>`;
    return;
  }

  const byDate = new Map();
  for (const m of upcoming){
    if (!byDate.has(m.date)){
      byDate.set(m.date, []);
    }
    byDate.get(m.date).push(m);
  }

  const startGrid = startOfWeekMonday(today);
  const endGrid = endOfWeekSunday(endWindow);
  const legend = PROFILES.map(p =>
    `<span class="legend-item"><span class="legend-dot" style="background:${escapeHtml(p.colors.accent)}"></span>${escapeHtml(p.label)}</span>`
  ).join("");

  let html = `<div class="calendar-wrap"><div class="calendar-legend">${legend}</div><div class="calendar-grid">`;
  for (const wd of DAYS_MONDAY_FIRST){
    html += `<div class="weekday">${escapeHtml(wd)}</div>`;
  }

  for (let d = new Date(startGrid); d <= endGrid; d.setDate(d.getDate() + 1)){
    const inRange = d >= today && d <= endWindow;
    const isPast = d < today;
    const key = dateKey(d);
    const dayMatches = byDate.get(key) || [];
    const chips = dayMatches.map(m => {
      const p = profileMeta(profileFromMatch(m));
      return `<div class="match-chip" style="border-left:4px solid ${escapeHtml(p.colors.accent)}">${matchDisplayText(m)}</div>`;
    }).join("");

    html += `<div class="day-cell ${inRange ? "" : "outside-range"} ${isPast ? "past-day" : ""}">
      <div class="day-head">
        <span class="day-weekday">${escapeHtml(DAYS_SHORT[d.getDay()])}</span>
        <span class="day-num">${d.getDate()}</span>
        <span class="day-month">${escapeHtml(MONTHS_SHORT[d.getMonth()])}</span>
      </div>
      <div class="day-matches">${chips}</div>
    </div>`;
  }

  html += `</div></div>`;
  app.innerHTML = html;
}

function renderLatest(){
  if (!latestData){
    return;
  }
  render(latestData);
}

function render(data){
  latestData = data;
  applyProfileTheme();
  renderTabs();
  setTitle();

  if (isCalendarTab()){
    renderCalendar(data.matches || []);
    return;
  }

  const app = document.getElementById("app");
  const matches = (data.matches || []).filter(m => profileFromMatch(m) === activeTab);

  if (matches.length === 0){
    app.innerHTML = `<div class="state">
      <h2>No fixtures found</h2>
      <p>Either there's nothing scheduled in the current window, or today's update hasn't run yet. Pull down to refresh in Safari, or check back after the next automatic update.</p>
    </div>`;
    return;
  }

  const today = new Date(); today.setHours(0,0,0,0);
  const upcoming = matches.filter(m => m.date && parseLocalDate(m.date) >= today && m.status !== "finished");
  const nextMatch = upcoming[0] || null;

  let html = renderHero(nextMatch);

  let lastHeading = null;
  for (const m of matches){
    const heading = m.date ? formatDateHeading(m.date) : "Date unknown";
    if (heading !== lastHeading){
      html += `<div class="date-heading">${escapeHtml(heading)}</div>`;
      lastHeading = heading;
    }
    html += renderMatchCard(m);
  }

  app.innerHTML = html;
}

function renderError(){
  document.getElementById("app").innerHTML = `<div class="state">
    <h2>Couldn't load fixtures</h2>
    <p>The data file didn't load. Check your connection and try again.</p>
    <button onclick="load()">Try again</button>
  </div>`;
}

function setUpdatedLabel(iso){
  const el = document.getElementById("updatedLabel");
  if (!iso){ el.textContent = ""; return; }
  const d = new Date(iso);
  const opts = { hour: "2-digit", minute: "2-digit" };
  el.innerHTML = `Updated<br>${d.toLocaleDateString(undefined,{day:"numeric",month:"short"})}, ${d.toLocaleTimeString(undefined,opts)}`;
}

function load(){
  document.getElementById("app").innerHTML = `<div class="state"><h2>Loading…</h2><p>Fetching the latest fixtures.</p></div>`;
  fetch(`data.json?t=${Date.now()}`)
    .then(r => { if (!r.ok) throw new Error("bad response"); return r.json(); })
    .then(data => {
      setUpdatedLabel(data.generated_at);
      render(data);
    })
    .catch(renderError);
}

load();
</script>
</body>
</html>
