name: Update Valur fixtures

on:
  schedule:
    # 06:00 UTC every day. Iceland doesn't use daylight saving time, so
    # this is always 06:00 local time too.
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated data.json (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data.json; then
            echo "No changes to data.json"
          else
            git add data.json
            git commit -m "Update fixtures ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
          fi
